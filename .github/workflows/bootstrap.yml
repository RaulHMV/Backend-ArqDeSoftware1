name: bootstrap

# Crea UNA sola vez el remote state: bucket S3 (versionado/cifrado) + tabla
# DynamoDB de lock. Se ejecuta manualmente con las llaves estaticas del usuario
# IAM github-actions-deploy (AdministratorAccess).
#
# Requisitos (Settings > Secrets and variables > Actions, scope repo):
#   - secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   - variable: AWS_REGION (ej. us-east-1)

on:
  workflow_dispatch:
    inputs:
      action:
        description: "plan o apply"
        required: true
        default: plan
        type: choice
        options: [plan, apply]

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/bootstrap
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        run: terraform plan -input=false

      - name: Terraform Apply
        if: ${{ inputs.action == 'apply' }}
        run: terraform apply -auto-approve -input=false

      - name: Mostrar outputs
        if: ${{ inputs.action == 'apply' }}
        run: terraform output
