name: deploy

# Despliegue MANUAL (nunca corre solo). En GitHub > Actions > deploy > Run workflow:
#   - "Use workflow from": elige la RAMA desde la que correr el pipeline.
#   - action: plan (solo previsualiza) o apply (despliega de verdad).
#   - confirm: para apply, escribe "deploy" como seguro anti-clics.
# Usa las llaves estaticas del usuario IAM github-actions-deploy (AdministratorAccess).
# Requisitos (Settings > Secrets and variables > Actions, scope repo):
#   - secrets: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   - variable: AWS_REGION (ej. us-east-1)

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Que hacer"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
      confirm:
        description: 'Para "apply" escribe: deploy'
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validar confirmacion (solo apply)
        if: ${{ inputs.action == 'apply' && inputs.confirm != 'deploy' }}
        run: |
          echo "::error::Para 'apply' debes escribir 'deploy' en el campo confirm."
          exit 1

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Lambdas
        working-directory: backend
        run: |
          npm install
          npm run build

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        working-directory: infra/environments/prod
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: infra/environments/prod
        run: terraform plan -input=false

      - name: Terraform Apply
        if: ${{ inputs.action == 'apply' }}
        working-directory: infra/environments/prod
        run: terraform apply -auto-approve -input=false

      - name: Outputs
        if: ${{ inputs.action == 'apply' }}
        working-directory: infra/environments/prod
        run: terraform output
